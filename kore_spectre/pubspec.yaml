name: kore_spectre
description: "KoreSpectre - Datacenter monitoring app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Estado
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navegação
  go_router: ^15.1.2

  # Armazenamento seguro de credenciais
  flutter_secure_storage: ^9.2.4

  # Preferências
  shared_preferences: ^2.3.4

  # Notificações locais
  flutter_local_notifications: ^18.0.1

  # Serviço em background para manter conexão ativa
  flutter_background_service: ^5.0.10

  # Firebase / FCM
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # HTTP
  dio: ^5.8.0+1

  # Utilitários
  intl: ^0.20.2
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.1
  build_runner: ^2.4.15
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "AkumaLogo.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0C0A18"
  adaptive_icon_foreground: "AkumaLogo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
