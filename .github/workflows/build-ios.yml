name: Build iOS IPA

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.1'
          channel: 'stable'
          cache: true

      - name: Add iOS platform
        working-directory: kore_spectre
        run: flutter create --platforms=ios .

      - name: Install dependencies
        working-directory: kore_spectre
        run: flutter pub get

      - name: Build iOS app (sem assinatura)
        working-directory: kore_spectre
        run: flutter build ios --release --no-codesign

      - name: Empacotar IPA para AltStore
        run: |
          mkdir -p Payload
          cp -r kore_spectre/build/ios/iphoneos/Runner.app Payload/Runner.app
          zip -r akuma.ipa Payload
          echo "IPA criado: $(du -sh akuma.ipa)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: akuma-ios
          path: akuma.ipa
          retention-days: 30
